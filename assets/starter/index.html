<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starter App</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./assets/ceapp-i18n.js"></script>
</head>
<body>
  <div class="shell">
    <header class="header">
      <img id="app-logo" class="app-logo" alt="" width="64" height="64">
      <div>
        <h1 id="app-title"></h1>
        <p id="app-subtitle"></p>
      </div>
    </header>

    <main class="panel">
      <h2 id="panel-title"></h2>
      <p id="panel-body"></p>
      <button id="primary-action" type="button"></button>
    </main>

    <section class="panel notification-panel">
      <div class="panel-head">
        <div>
          <h2 id="notification-title"></h2>
          <p id="notification-body"></p>
        </div>
        <div class="actions">
          <button id="notification-refresh" type="button"></button>
          <button id="notification-open-settings" type="button"></button>
          <button id="notification-register" type="button"></button>
          <button id="notification-toggle" type="button"></button>
          <button id="notification-send-direct" type="button"></button>
          <button id="notification-send-feature" type="button"></button>
          <button id="notification-delete" type="button"></button>
        </div>
      </div>
      <div class="notification-grid">
        <div class="notification-note">
          <strong id="notification-rules-title"></strong>
          <ul id="notification-rules-list"></ul>
        </div>
        <pre id="notification-status-output"></pre>
      </div>
      <div class="notification-grid">
        <pre id="notification-feature-output"></pre>
        <pre id="notification-action-output"></pre>
      </div>
    </section>

    <section class="panel ai-panel">
      <h2 id="ai-title"></h2>
      <p id="ai-body"></p>
      <textarea id="ai-prompt"></textarea>
      <div class="actions">
        <button id="ai-text-action" type="button"></button>
        <button id="ai-status-action" type="button"></button>
      </div>
      <pre id="ai-output"></pre>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
